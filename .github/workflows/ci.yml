name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # PostgreSQL service container for E2E tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Workaround for .NET 10 SDK glob expansion bug
        run: mkdir -p LocalFinanceManager/bin/Debug

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run unit and integration tests
        run: dotnet test tests/LocalFinanceManager.Tests/ --configuration Release --no-build --logger "console;verbosity=minimal" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__Local: "Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres"

      - name: Run ML tests
        run: dotnet test tests/LocalFinanceManager.ML.Tests/ --configuration Release --no-build --logger "console;verbosity=minimal" --collect:"XPlat Code Coverage"

      - name: Build E2E project (prepares Playwright)
        run: dotnet build tests/LocalFinanceManager.E2E/ --configuration Release --no-restore

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('tests/LocalFinanceManager.E2E/LocalFinanceManager.E2E.csproj') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh -Command "cd tests/LocalFinanceManager.E2E; pwsh bin/Release/net10.0/playwright.ps1 install --with-deps chromium"
        shell: pwsh

      - name: Install Playwright OS dependencies only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pwsh -Command "cd tests/LocalFinanceManager.E2E; pwsh bin/Release/net10.0/playwright.ps1 install-deps chromium"
        shell: pwsh

      - name: Run E2E tests - Phase 1 (Import + Basic Assignment)
        timeout-minutes: 10
        run: dotnet test tests/LocalFinanceManager.E2E/ --configuration Release --no-build --logger "console;verbosity=minimal" --collect:"XPlat Code Coverage" --filter "FullyQualifiedName~TransactionImportTests|FullyQualifiedName~BasicAssignmentTests|FullyQualifiedName~MultiAccountValidationTests"
        env:
          E2E_PG_CONNECTION: "Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres"
          Supabase__Url: ${{ secrets.SUPABASE_TEST_URL }}
          Supabase__AnonKey: ${{ secrets.SUPABASE_TEST_KEY }}
          Supabase__JwtSecret: ${{ secrets.SUPABASE_TEST_JWT_SECRET }}

      - name: Run E2E tests - Phase 2 (Split + Bulk Assignment)
        timeout-minutes: 10
        run: dotnet test tests/LocalFinanceManager.E2E/ --configuration Release --no-build --logger "console;verbosity=minimal" --collect:"XPlat Code Coverage" --filter "FullyQualifiedName~SplitAssignmentTests|FullyQualifiedName~BulkAssignmentTests"
        env:
          E2E_PG_CONNECTION: "Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres"
          Supabase__Url: ${{ secrets.SUPABASE_TEST_URL }}
          Supabase__AnonKey: ${{ secrets.SUPABASE_TEST_KEY }}
          Supabase__JwtSecret: ${{ secrets.SUPABASE_TEST_JWT_SECRET }}

      - name: Run E2E tests - Phase 3 (Integration Workflow + UX + Other)
        timeout-minutes: 10
        run: dotnet test tests/LocalFinanceManager.E2E/ --configuration Release --no-build --logger "console;verbosity=minimal" --collect:"XPlat Code Coverage" --filter "FullyQualifiedName~IntegrationWorkflowTests|FullyQualifiedName~AccessibilityTests|FullyQualifiedName~KeyboardNavigationTests|FullyQualifiedName~UXEnhancementsTests|FullyQualifiedName~AccountCrudTests|FullyQualifiedName~BudgetPlanTests|FullyQualifiedName~AdminSettingsTests|FullyQualifiedName~SmokeTests"
        env:
          E2E_PG_CONNECTION: "Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres"
          Supabase__Url: ${{ secrets.SUPABASE_TEST_URL }}
          Supabase__AnonKey: ${{ secrets.SUPABASE_TEST_KEY }}
          Supabase__JwtSecret: ${{ secrets.SUPABASE_TEST_JWT_SECRET }}

      - name: Run E2E tests - Phase 4 (ML Suggestions + Auto-Apply + Monitoring)
        timeout-minutes: 10
        run: dotnet test tests/LocalFinanceManager.E2E/ --configuration Release --no-build --logger "console;verbosity=minimal" --collect:"XPlat Code Coverage" --filter "FullyQualifiedName~MLSuggestionTests|FullyQualifiedName~AutoApplyTests|FullyQualifiedName~MonitoringDashboardTests"
        env:
          E2E_PG_CONNECTION: "Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres"
          Supabase__Url: ${{ secrets.SUPABASE_TEST_URL }}
          Supabase__AnonKey: ${{ secrets.SUPABASE_TEST_KEY }}
          Supabase__JwtSecret: ${{ secrets.SUPABASE_TEST_JWT_SECRET }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/**/*.trx"
          retention-days: 30

      - name: Upload screenshots and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: |
            **/test-results/screenshots/**
            **/test-results/videos/**
          retention-days: 30

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: "**/TestResults/**/coverage.cobertura.xml"
          retention-days: 30
